<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — YONSA Mothercare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">YONSA <span>Mothercare</span><small>Baby &amp; Maternity</small></a>
      <button class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('show')">&#9776;</button>
      <div class="nav-links">
        <a href="index.html">Home</a><a href="shop.html">Shop</a>
        <a href="cart.html">Cart <span class="cart-count">0</span></a>
        <a href="track.html">Track</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="admin.html">Admin</a>
      </div>
    </div>
  </nav>
  <main class="container">
    <section class="checkout-page">
      <h1>Checkout</h1>
      <div class="checkout-grid">
        <div class="checkout-form">
          <form id="checkoutForm" onsubmit="placeOrder(event)">
            <h3>Shipping Details</h3>
            <div class="form-group"><label>Full Name *</label><input type="text" id="cf_name" required></div>
            <div class="form-group"><label>Email *</label><input type="email" id="cf_email" required></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="cf_phone" placeholder="+233 ..."></div>
            <div class="form-group"><label>Delivery Address</label><textarea id="cf_address" rows="3"></textarea></div>
            <h3 style="margin-top:1.8rem">Payment Method</h3>
            <div class="payment-options">
              <label class="payment-option"><input type="radio" name="pm" value="Mobile Money" checked><span>Mobile Money (MTN / Telecel / AirtelTigo)</span></label>
              <label class="payment-option"><input type="radio" name="pm" value="Card"><span>Visa / MasterCard</span></label>
              <label class="payment-option"><input type="radio" name="pm" value="Bank Transfer"><span>Bank Transfer</span></label>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="margin-top:1.5rem;width:100%">Place Order</button>
          </form>
        </div>
        <div class="checkout-summary" id="checkoutSummary"></div>
      </div>
    </section>
  </main>
  <footer class="footer">
    <div class="container footer-grid"><div class="footer-col"><h3>YONSA <span>Mothercare</span></h3><p>Premium baby and maternity products.</p></div><div class="footer-col"><h4>Links</h4><a href="index.html">Home</a><a href="shop.html">Shop</a></div><div class="footer-col"><h4>Contact</h4><p>info@yonsa.com</p></div></div>
    <div class="container footer-bottom"><p>&copy; 2026 YONSA Mothercare</p></div>
  </footer>
  <script src="js/data.js"></script>
  <script>
    updateCartCount();
    const cart = getCart();
    const summary = document.getElementById('checkoutSummary');
    if (!cart.length) { window.location.href = 'cart.html'; }
    let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
    let html = '<h3 style="margin-bottom:0.8rem">Order Summary</h3>';
    cart.forEach(item => {
      html += '<div class="summary-item"><span>' + item.name + ' x' + item.qty + '</span><span>GH₵' + (item.price * item.qty).toFixed(2) + '</span></div>';
    });
    html += '<div class="summary-line" style="margin-top:0.5rem"><span>Subtotal</span><span>GH₵' + subtotal.toFixed(2) + '</span></div>';
    html += '<div class="summary-total"><strong>Total: GH₵' + subtotal.toFixed(2) + '</strong></div>';
    summary.innerHTML = html;

    function placeOrder(e) {
      e.preventDefault();
      const name = document.getElementById('cf_name').value;
      const email = document.getElementById('cf_email').value;
      if (!name || !email) { alert('Name and email are required'); return; }
      const pm = document.querySelector('input[name="pm"]:checked').value;
      localStorage.setItem('yonsa_order', JSON.stringify({
        name, email, total: subtotal.toFixed(2), ref: 'YON-' + Math.random().toString(36).slice(2, 10).toUpperCase(), payment: pm, date: new Date().toISOString()
      }));
      saveCart([]);
      window.location.href = 'success.html';
    }
  </script>
</body>
</html>
