<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed — YONSA Mothercare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo"><img src="images/logo.png" alt="YONSA Mothercare" class="logo-img"></a>
      <button class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('show')">&#9776;</button>
      <div class="nav-links">
        <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="cart.html">Cart <span class="cart-count">0</span></a>
        <a href="track.html">Track</a><a href="about.html">About</a><a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>
  <main class="container">
    <section class="success-page">
      <div class="success-card" id="successCard"></div>
    </section>
  </main>
  <footer class="footer">
    <div class="container footer-grid"><div class="footer-col"><h3>YONSA <span>Mothercare</span></h3></div><div class="footer-col"><h4>Links</h4><a href="index.html">Home</a><a href="shop.html">Shop</a></div></div>
    <div class="container footer-bottom"><p>&copy; 2026 YONSA Mothercare</p></div>
  </footer>
  <script src="js/data.js"></script>
  <script>
    updateCartCount();
    const order = JSON.parse(localStorage.getItem('yonsa_order') || '{}');
    document.getElementById('successCard').innerHTML =
      '<div class="success-icon">&#10003;</div>' +
      '<h1>Order Placed!</h1>' +
      '<p>Thank you, <strong>' + (order.name || 'Customer') + '</strong>!</p>' +
      '<p class="order-ref">Order Reference: <strong>' + (order.ref || 'YON-00000000') + '</strong></p>' +
      '<p style="font-size:1.2rem;color:#e85d75;font-weight:700">Total: GH₵' + (order.total || '0.00') + '</p>' +
      '<p>We\'ll send a confirmation to ' + (order.email || 'your email') + '</p>' +
      '<p class="payment-info">Payment via <strong>' + (order.payment || 'Bank Transfer') + '</strong></p>' +
      '<div class="success-actions"><a href="track.html" class="btn btn-primary">Track Order</a><a href="shop.html" class="btn btn-secondary">Continue Shopping</a></div>';
  </script>
</body>
</html>
